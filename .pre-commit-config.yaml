repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - click==8.4.1
          - httpx==0.28.1
          - mattermostautodriver==11.7.2
          - mypy[faster-cache]==2.1.0
          - pytest==9.0.3
          - types-tabulate==0.10.0.20260508
          - Unidecode==1.4.0
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.20
    hooks:
      - id: uv-lock
