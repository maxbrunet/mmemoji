repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.56
    hooks:
      - id: ty
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.27
    hooks:
      - id: uv-lock
